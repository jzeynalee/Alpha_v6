# pytest.ini — Alpha Factory V3 test configuration
#
# This file MUST live in the project root (E:\pyProject\Alpha_v3), next to
# the `src/` directory. Its location is what pytest uses as `rootdir`.
#
# Three things make the suite runnable; without any one of them `pytest`
# fails before a single test executes:
#
# 1. pythonpath = .
#    conftest.py does `import src...` at collection time. pytest does NOT put
#    the project root on sys.path by default, so `import src` raises
#    ModuleNotFoundError: No module named 'src'. `pythonpath = .` (pytest 7+)
#    prepends the rootdir to sys.path before collection, which resolves it.
#    This is why `pytest` failed on Windows even though the test logic is fine.
#
# 2. asyncio_mode = auto
#    pytest-asyncio otherwise runs "strict": an `async def test_...` with no
#    @pytest.mark.asyncio marker is reported as a failure ("async def
#    functions are not natively supported"). test_alpha_factory_v3.py has
#    several unmarked async tests. `auto` treats every coroutine test as
#    async automatically; existing markers stay valid (just redundant).
#
# 3. The dependencies in requirements-test.txt
#    conftest.py imports src.features.features_engineering, which does
#    `from numba import njit` at import time — numba must be installed even
#    though conftest then patches the JIT warmup to a no-op.

[pytest]
# Put the project root (this file's directory) on sys.path so `import src`
# works from conftest.py and every test module. Requires pytest >= 7.0.
pythonpath = .

# Treat every coroutine test function as async — no marker needed.
asyncio_mode = auto

# Default fixture loop scope (silences a pytest-asyncio config warning).
asyncio_default_fixture_loop_scope = function

# Test discovery: only the tests/ directory, standard naming.
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Quieter, more useful default output.
addopts =
    -ra
    --strict-markers
    --tb=short

# Registered markers (so --strict-markers does not warn on them).
markers =
    asyncio: an async test coroutine (auto-applied; mode = auto).
    slow: a long-running test (deselect with '-m "not slow"').
    integration: marks integration tests (deselect with '-m "not integration"')

# Third-party numerical warnings are noisy but harmless for these tests.
# Promote nothing to an error; just keep the summary readable.
filterwarnings =
    default
    ignore::DeprecationWarning:pandas.*
    ignore:.*Precision loss occurred.*:RuntimeWarning